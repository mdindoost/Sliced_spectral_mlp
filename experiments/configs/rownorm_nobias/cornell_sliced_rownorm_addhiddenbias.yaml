# Per-slice row norm, hidden bias added (hidden_bias=True, head_bias=True)
dataset: cornell
n_classes: 5
k: 64
n_layers: 2
lr: 0.01
weight_decay: 0.0005
epochs: 200
seed: 42
loss_strategy: uniform
loss_cutoff: null
use_sphere_norm: true
use_row_norm_input: true
hidden_bias: true
head_bias: true
output_dir: outputs/rownorm_nobias
run_name: rownorm_addhiddenbias
