# RowNormMLP-full: input_dim=64, no bias, sphere norm at input+layers
# NOTE: run via scripts/run_rownorm.py — not supported by run_experiment.py
dataset: citeseer
n_classes: 6
k: 64
n_layers: 2
lr: 0.01
weight_decay: 0.0005
epochs: 200
seed: 42
model_type: rownorm_mlp
input_dim: 64
use_row_norm_input: true
use_sphere_norm: true
