# Actor dataset configuration.
# Heterophilous co-occurrence network. N≈7600, 5 classes, 10 fixed splits.

dataset: actor
n_classes: 5
k: 64
n_layers: 2
lr: 0.01
weight_decay: 0.0005
epochs: 100           # 200 is too slow for 10 splits on this size
loss_strategy: uniform
loss_cutoff: null
seed: 42
n_splits: 10
